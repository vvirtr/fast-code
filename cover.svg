<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b4d8ff"/>
      <stop offset="50%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#7ab8f5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)" rx="12"/>

  <!-- Terminal chrome -->
  <rect x="40" y="30" width="820" height="440" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="30" width="820" height="32" rx="8" fill="#161b22"/>
  <rect x="40" y="54" width="820" height="8" fill="#161b22"/>
  <circle cx="62" cy="46" r="6" fill="#ff5f57"/>
  <circle cx="82" cy="46" r="6" fill="#febc2e"/>
  <circle cx="102" cy="46" r="6" fill="#28c840"/>
  <text x="450" y="50" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="12">fast</text>

  <!-- Mascot + lightning -->
  <text x="68" y="100" fill="#93c5fd" font-family="monospace" font-size="14" xml:space="preserve"> &#x2590;&#x259B;&#x2588;&#x2588;&#x2588;&#x259C;&#x258C;</text>
  <text x="68" y="116" fill="#93c5fd" font-family="monospace" font-size="14" xml:space="preserve">&#x259D;&#x259C;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x259B;&#x2598;</text>
  <text x="68" y="132" fill="#93c5fd" font-family="monospace" font-size="14" xml:space="preserve">  &#x2598;&#x2598; &#x259D;&#x259D;  </text>
  <!-- Lightning next to right hand -->
  <text x="160" y="107" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="bold" filter="url(#glow)">&#x2593;&#x2593;</text>
  <text x="155" y="118" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="bold" filter="url(#glow)">&#x2593;&#x2593;&#x2593;</text>
  <text x="160" y="129" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="bold" filter="url(#glow)">&#x2593;&#x2593;</text>

  <!-- Header text -->
  <text x="200" y="100" fill="#93c5fd" font-family="monospace" font-size="15" font-weight="bold">Fast Code</text>
  <text x="290" y="100" fill="#6e7681" font-family="monospace" font-size="15"> v2.1.88-fast</text>
  <text x="200" y="118" fill="#6e7681" font-family="monospace" font-size="13">anthropic/claude-opus-4.6 · API Usage Billing</text>
  <text x="200" y="136" fill="#6e7681" font-family="monospace" font-size="13">/home/vvirtr</text>

  <!-- Separator -->
  <line x1="60" y1="155" x2="840" y2="155" stroke="#afc8f0" stroke-width="1" opacity="0.4"/>

  <!-- User input -->
  <text x="68" y="180" fill="#93c5fd" font-family="monospace" font-size="14">&#x276F;</text>
  <text x="86" y="180" fill="#e6edf3" font-family="monospace" font-size="14">hi</text>

  <!-- Separator -->
  <line x1="60" y1="195" x2="840" y2="195" stroke="#afc8f0" stroke-width="1" opacity="0.4"/>

  <!-- Thinking -->
  <text x="68" y="220" fill="#93c5fd" font-family="monospace" font-size="13" font-style="italic">&#x2234; Thinking...</text>

  <!-- Response timestamp (moved left to fit) -->
  <text x="540" y="250" text-anchor="start" fill="#93c5fd" font-family="monospace" font-size="11">10:34 PM</text>
  <text x="620" y="250" text-anchor="start" fill="#93c5fd" font-family="monospace" font-size="11">anthropic/claude-opus-4.6</text>

  <!-- Response -->
  <text x="68" y="274" fill="#93c5fd" font-family="monospace" font-size="14">&#x25CF;</text>
  <text x="86" y="274" fill="#e6edf3" font-family="monospace" font-size="14">Hi! I'm Fast Code, an optimized CLI assistant powered by</text>
  <text x="86" y="294" fill="#e6edf3" font-family="monospace" font-size="14">Claude. I can help with coding, debugging, file management,</text>
  <text x="86" y="314" fill="#e6edf3" font-family="monospace" font-size="14">git operations, and more.</text>
  <text x="86" y="344" fill="#e6edf3" font-family="monospace" font-size="14">What can I help you with?</text>

  <!-- Bottom separator -->
  <line x1="60" y1="365" x2="840" y2="365" stroke="#afc8f0" stroke-width="1" opacity="0.4"/>

  <!-- Prompt -->
  <text x="68" y="390" fill="#93c5fd" font-family="monospace" font-size="14">&#x276F;</text>
  <rect x="86" y="378" width="8" height="16" fill="#e6edf3" opacity="0.7"/>

  <!-- Bottom separator -->
  <line x1="60" y1="405" x2="840" y2="405" stroke="#afc8f0" stroke-width="1" opacity="0.4"/>

  <!-- Footer -->
  <text x="68" y="425" fill="#93c5fd" font-family="monospace" font-size="12">&#x23F5;&#x23F5; bypass permissions on</text>
  <text x="280" y="425" fill="#6e7681" font-family="monospace" font-size="12">(shift+tab to cycle)</text>

  <!-- Stats badge -->
  <rect x="590" y="440" width="250" height="24" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="605" y="456" fill="#6e7681" font-family="monospace" font-size="11">-88% bundle</text>
  <text x="700" y="456" fill="#6e7681" font-family="monospace" font-size="11">-30% RAM</text>
  <text x="785" y="456" fill="#6e7681" font-family="monospace" font-size="11">-27% TTFT</text>
</svg>
